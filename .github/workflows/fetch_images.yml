name: Fetch place images

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r cron/requirements.txt

      - name: Verify env vars are set
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "ERROR: SUPABASE_URL is not set"; exit 1; fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then echo "ERROR: SUPABASE_SERVICE_KEY is not set"; exit 1; fi
          echo "SUPABASE_URL is set: $SUPABASE_URL"
          echo "SUPABASE_SERVICE_KEY is set: (hidden)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run image fetcher
        run: python cron/run_fetch.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FLICKR_API_KEY: ${{ secrets.FLICKR_API_KEY }}
